<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalon Alone</title>
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/header.css">
    <link rel="stylesheet" href="/static/css/setup.css">
    <link rel="stylesheet" href="/static/css/info.css">
    <link rel="stylesheet" href="/static/css/table.css">
    <link rel="stylesheet" href="/static/css/chat.css">
    <link rel="stylesheet" href="/static/css/modal.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
    <link rel="stylesheet" href="/static/css/layout-mobile.css">
    <link rel="stylesheet" href="/static/css/missionVideo.css">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
</head>
<body>
    <div id="app">
        <!-- 游戏标题 -->
        <header class="game-header">
            <div class="header-menu" id="headerMenu">
                <button
                    type="button"
                    class="menu-toggle"
                    id="menuToggle"
                    aria-label="打开菜单"
                    aria-expanded="false"
                    aria-controls="headerDropdown"
                >
                    <span class="menu-toggle-bar"></span>
                    <span class="menu-toggle-bar"></span>
                    <span class="menu-toggle-bar"></span>
                </button>
                <div class="header-dropdown" id="headerDropdown" hidden>
                    <div class="header-dropdown-label">布局</div>
                    <button type="button" class="header-dropdown-item header-dropdown-item--checkable" data-layout-pref="auto">自动</button>
                    <button type="button" class="header-dropdown-item header-dropdown-item--checkable" data-layout-pref="desktop">电脑版</button>
                    <button type="button" class="header-dropdown-item header-dropdown-item--checkable" data-layout-pref="mobile">手机版</button>
                    <div class="header-dropdown-divider" role="separator"></div>
                    <button type="button" class="header-dropdown-item header-dropdown-item--danger" id="resetGameMenuItem">
                        放弃本局
                    </button>
                </div>
            </div>
            <h1>AVALON</h1>
            <div class="game-status" id="gameStatus">等待开始游戏</div>
        </header>

        <!-- 游戏设置面板 -->
        <div id="gameSetup" class="game-setup">
            <h2>召集 AI 勇士</h2>
            <div class="player-config">
                <div class="player-input">
                    <input type="text" id="playerName" placeholder="AI 玩家编号" maxlength="20">
                    <button onclick="startGame()" id="startButton" disabled>出征</button>
                </div>
                <div class="player-list" id="playerList">
                    <!-- 玩家列表将在这里显示 -->
                </div>
                <button onclick="addPlayer()" class="add-player-btn" id="addPlayerBtn">+</button>
            </div>
        </div>

        <!-- 游戏主界面 -->
        <div id="gameInterface" class="game-main" style="display: none;">
            <div class="game-interface">
                <div class="mission-board">
                    <h3>任务战况</h3>
                    <div class="mission-progress" id="missionProgress">
                        <!-- 任务进度将在这里显示 -->
                    </div>
                </div>

                <div class="current-phase">
                    <h3>当前局势</h3>
                    <div id="currentPhase">等待开始</div>
                </div>

                <div class="game-table">
                    <div class="players-container" id="playersContainer">
                        <!-- 玩家将在这里显示 -->
                    </div>
                </div>
            </div>

            <div
                class="chat-panel-splitter"
                id="chatPanelResizeHandle"
                role="separator"
                aria-orientation="vertical"
                aria-label="拖动调整战报宽度"
                tabindex="0"
            ></div>

            <!-- 战报侧栏（独立于牌桌网格，避免被裁切） -->
            <aside class="chat-panel" id="chatPanel">
                <h3 class="chat-panel-title" id="chatPanelToggle">
                    <span>战报</span>
                    <span class="chat-collapse-icon" aria-hidden="true">▾</span>
                </h3>
                <div class="chat-messages" id="chatMessages">
                    <!-- 聊天消息将在这里显示 -->
                </div>
            </aside>
        </div>

        <!-- 游戏结果模态框 -->
        <div id="gameResultModal" class="modal" style="display: none;">
            <div class="modal-content">
                <h2 id="resultTitle">游戏结束</h2>                <p id="resultMessage"></p>
                <button onclick="resetGame()">再战一局</button>
            </div>
        </div>
        
        <!-- 任务过场动画 -->
        <div id="missionVideoOverlay" class="mission-video-overlay">
            <video id="missionVideo" playsinline></video>
            <div id="missionVideoWaiting" class="mission-video-waiting" style="display: none;">
                <div class="mission-video-spinner"></div>
                <div class="mission-video-waiting-text">任务执行中，等待结果...</div>
            </div>
        </div>

        <!-- 发言气泡层（置顶，避免被牌桌上方面板遮挡） -->
        <div id="speechBubbleOverlay" class="speech-bubble-overlay" aria-hidden="true"></div>

        <!-- 当前发言者指示器 -->
        <div id="currentSpeaker" class="current-speaker-indicator">
            正在发言: <span id="speakerName"></span>
        </div>
        
    </div>

    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
